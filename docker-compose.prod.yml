services:
  ask-my-pdf:
    image: ${IMAGE_TAG:-ghcr.io/zandit/plot-solutions-ask-my-pdf:latest}
    container_name: ask-my-pdf
    expose:
      - "5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Anthropic__ApiKey=${ANTHROPIC_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OpenAI__ApiKey=${OPENAI_API_KEY}
      - Anthropic__AnswerModel=${ANSWER_MODEL:-claude-sonnet-4-20250514}
      - Anthropic__FocusModel=${FOCUS_MODEL:-claude-haiku-4-5-20251001}
      - Database__Path=/data/askmypdf.db
    volumes:
      - askmypdf-data:/data
      - claude-config:/root/.claude
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  caddy:
    image: caddy:2-alpine
    container_name: ask-my-pdf-caddy
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - ask-my-pdf
    restart: unless-stopped

volumes:
  claude-config:
  askmypdf-data:
  caddy-data:
  caddy-config:
